# Config for benchmarks/run_benchmark_matrix.py
#
# Run with (from the repo root, since cmd: lines use relative paths):
#   python benchmarks/run_benchmark_matrix.py benchmarks/benchmark_matrix.yaml
#
# - output_dir: where benchmark runs drop their results subdirectories
# - archive_dir: where the script moves each run's subdirectory to (created if missing)
# - runs: list of refs; each is either `branch:` OR `commit:` (not both)
#   each entry has a list of benchmarks with a shell `cmd` and a `rename_to`
#   target name (the moved subdirectory's new name under archive_dir)

output_dir: /home/michael.blum/vLLM_Patched/benchmarks/results/
archive_dir: /home/michael.blum/vLLM_Patched/benchmarks/paper_results/

# Constants — referenced as *llama_cmd / *qwen_cmd / *mixtral_cmd below.
# This key is ignored by run_benchmark_matrix.py (it only reads output_dir,
# archive_dir, and runs). Each `>-` folded scalar joins its indented lines with
# single spaces and strips the trailing newline, yielding one shell command.
_commands:
  - &llama_cmd >-
      vllm bench sweep serve
      --serve-cmd 'vllm serve meta-llama/Meta-Llama-3.1-8B-Instruct --dtype float16 --tensor-parallel-size 2'
      --bench-cmd 'vllm bench serve --backend vllm --model meta-llama/Meta-Llama-3.1-8B-Instruct --endpoint /v1/completions --dataset-name sharegpt --dataset-path ./ShareGPT_V3_unfiltered_cleaned_split.json --num-prompts 250'
      --serve-params benchmarks/serve_hparams.json
      --bench-params benchmarks/bench_hparams.json
      -o benchmarks/results --num-runs 10

  - &qwen_cmd >-
      vllm bench sweep serve
      --serve-cmd 'vllm serve Qwen/Qwen3-8B --dtype float16 --tensor-parallel-size 2'
      --bench-cmd 'vllm bench serve --backend vllm --model Qwen/Qwen3-8B --endpoint /v1/completions --dataset-name sharegpt --dataset-path ./ShareGPT_V3_unfiltered_cleaned_split.json --num-prompts 250'
      --serve-params benchmarks/serve_hparams.json
      --bench-params benchmarks/bench_hparams.json
      -o benchmarks/results --num-runs 10

  - &mixtral_cmd >-
      vllm bench sweep serve
      --serve-cmd 'vllm serve mistralai/Mixtral-8x7B-Instruct-v0.1 --dtype float16 --tensor-parallel-size 2'
      --bench-cmd 'vllm bench serve --backend vllm --model mistralai/Mixtral-8x7B-Instruct-v0.1 --endpoint /v1/completions --dataset-name sharegpt --dataset-path ./ShareGPT_V3_unfiltered_cleaned_split.json --num-prompts 250 --ignore-eos'
      --serve-params benchmarks/serve_hparams.json
      --bench-params benchmarks/bench_hparams.json
      -o benchmarks/results --num-runs 10

runs:

  - branch: x_platform_only
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_platform_only }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_mixtral_app_4
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_4 }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_vanilla 
    benchmarks:
      - { cmd: *mixtral_cmd,    rename_to: mixtral_vanilla_run }

  - branch: x_mixtral_app_1
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_1 }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_mixtral_app_2
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_2 }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_mixtral_app_3
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_3 }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_mixtral_app_5
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_5 }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_mixtral_app_6
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_6 }   # intentional: qwen3 on llama_app_2 branch

  - branch: x_mixtral_app_7
    benchmarks:
      - { cmd: *mixtral_cmd,  rename_to: mixtral_app_7 }   # intentional: qwen3 on llama_app_2 branch
